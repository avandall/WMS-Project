name: WMS CI

on: [push, pull_request]

jobs:
  test-python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Set up virtual environment and install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      
      - name: Set up environment variables
        run: |
          echo "DATABASE_URL=sqlite:///./test.db" >> $GITHUB_ENV
          echo "SECRET_KEY=test-secret-key-for-ci-only-32-chars-minimum" >> $GITHUB_ENV
          echo "AI_ENGINE_PROVIDER=openai" >> $GITHUB_ENV
          echo "AI_ENGINE_MODEL=gpt-3.5-turbo" >> $GITHUB_ENV
          echo "AI_ENGINE_API_KEY=test-key-32-chars-minimum-length" >> $GITHUB_ENV
      
      - name: Make test script executable
        run: chmod +x run_tests.sh
      
      - name: Run tests
        run: |
          source .venv/bin/activate
          ./run_tests.sh --verbose
      
      - name: Run tests with coverage (optional)
        if: github.event_name == 'pull_request'
        run: |
          source .venv/bin/activate
          pip install pytest-cov
          ./run_tests.sh --cov=src --cov-report=xml --cov-report=html
      
      - name: Upload coverage reports
        if: github.event_name == 'pull_request'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella 
      
