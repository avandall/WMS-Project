# Prometheus Configuration for WMS Monitoring
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'wms-cluster'
    replica: 'prometheus-1'

rule_files:
  - "alert_rules.yml"

scrape_configs:
  # WMS Backend API
  - job_name: 'wms-backend'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s
    relabel_configs:
      - source_labels: true
      - target_label: instance

  # Nginx Reverse Proxy
  - job_name: 'wms-nginx'
    static_configs:
      - targets: ['nginx:80']
    metrics_path: '/nginx_status'
    scrape_interval: 30s
    scrape_timeout: 10s

  # PostgreSQL Database
  - job_name: 'wms-postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # Redis Cache
  - job_name: 'wms-redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # Node Exporter (System Metrics)
  - job_name: 'wms-system'
    static_configs:
      - targets: ['node-exporter:9100']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

# Alerting Rules
alerting:
  alert_rules:
    - file: "alert_rules.yml"
  
receivers:
  - name: 'slack-webhook'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR_SLACK_WEBHOOK_ID'
        channel: '#wms-alerts'
        send_resolved: true
        title: 'WMS Alert'
        text: '{{ template "WMS Alert: {{ .CommonAnnotations.summary }}" }}'

  - name: 'email'
    email_configs:
      - to: 'admin@wms-company.com'
        from: 'alerts@wms-company.com'
        smarthost: 'smtp.gmail.com:587'
        auth_username: 'alerts@wms-company.com'
        auth_password: 'your-email-password'
        require_tls: true
